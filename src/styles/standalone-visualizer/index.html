<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Visualizer - Masterpiece Purbalingga</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    </svg>
                    Design Visualizer
                </h1>
                <p class="header-subtitle">Masterpiece Purbalingga</p>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h2 class="hero-title">Design Your Custom Exhaust</h2>
            <p class="hero-subtitle">Local Craftsmanship meets Innovation</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="main-section">
        <div class="container">
            <div class="grid-layout">
                <!-- Left Panel -->
                <div class="input-panel">
                    <!-- Tabs -->
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="text">Text Mode</button>
                        <button class="tab-btn" data-tab="custom">Custom Builder</button>
                    </div>

                    <!-- Text Mode -->
                    <div class="tab-content active" id="text-tab">
                        <div class="card">
                            <h3>Describe Your Vision</h3>
                            <textarea id="text-prompt" rows="8" placeholder="e.g., Carbon fiber dual tip exhaust with blue titanium finish..."></textarea>
                            <div id="error-message" class="error hidden"></div>
                            <button id="generate-text-btn" class="btn-primary">Generate Visualization</button>
                        </div>
                    </div>

                    <!-- Custom Builder -->
                    <div class="tab-content" id="custom-tab">
                        <div class="card">
                            <h3>Custom Exhaust Builder</h3>
                            
                            <label>Exhaust Type</label>
                            <select id="exhaust-type">
                                <option value="single-tip">Single Tip</option>
                                <option value="dual-tip" selected>Dual Tip</option>
                                <option value="quad-tip">Quad Tip</option>
                            </select>

                            <label>Shape Design</label>
                            <select id="shape-design">
                                <option value="round" selected>Round</option>
                                <option value="oval">Oval</option>
                                <option value="hexagonal">Hexagonal</option>
                            </select>

                            <label>Color</label>
                            <input type="color" id="color-picker" value="#1a1a1a">
                            <input type="text" id="color-hex" value="#1a1a1a">

                            <label>Finish</label>
                            <select id="finish">
                                <option value="glossy" selected>Glossy</option>
                                <option value="matte">Matte</option>
                                <option value="brushed">Brushed</option>
                            </select>

                            <label>Additional Design</label>
                            <select id="additional-design">
                                <option value="none">None</option>
                                <option value="carbon-fiber">Carbon Fiber</option>
                                <option value="titanium-burn">Titanium Burn</option>
                            </select>

                            <label>Motorcycle Brand/Model</label>
                            <input type="text" id="motorcycle-brand" placeholder="e.g., Yamaha R15">

                            <div id="custom-error" class="error hidden"></div>
                            <button id="generate-custom-btn" class="btn-primary">Generate Design</button>
                        </div>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="output-panel">
                    <div class="card">
                        <h3>Generated Preview</h3>
                        
                        <div id="loading-state" class="hidden">
                            <div class="loader"></div>
                            <p>Creating your vision...</p>
                        </div>

                        <div id="image-state" class="hidden">
                            <img id="generated-image" src="" alt="Generated Exhaust">
                            <button id="download-btn" class="btn-secondary">Download Image</button>
                        </div>

                        <div id="empty-state">
                            <p>No visualization yet</p>
                            <p>Enter your design and click Generate</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2025 Masterpiece Purbalingga</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
